kind = "web"
previewPath = "/"
title = "Fulcrum-India"
version = "1.0.0"
id = "artifacts/fulcrum-india"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 18581

[services.development]
run = "pnpm --filter @workspace/fulcrum-india run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/fulcrum-india", "run", "build" ]
publicDir = "artifacts/fulcrum-india/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "18581"
BASE_PATH = "/"
